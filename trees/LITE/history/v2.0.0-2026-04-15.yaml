# ============================================
# Step 1 — 敘事偵測
# ============================================
narrative:
  market_story: "Nvidia-blessed photonics monopoly，CEO 公開聲明『could sell out through 2028』，backlog 延伸至 2028，敘事標籤從『1.6T supercycle beneficiary』升級為『AI infra 核心 choke point』"
  implied_assumptions:
    - "當前 EV/Rev 30x premium 是永久的（vs 同業 10.8x，2.8x 溢價）"
    - "Nvidia $2B preferred equity = 結構性鎖定（不可拆、視同獨家）"
    - "Hyperscaler capex +67% YoY 可延續至 2027 以後（忽略基期效應）"
    - "CPO 過渡期 LITE 作為 InP 上游供應商的受益 > 作為 pluggable 廠的受害"
    - "GM 42.5% 是新常態而非週期頂"
    - "14 家分析師裡 13 家 PT 低於現價的狀態會被現價『帶著跑』，而非股價回落"
  pricing_logic: "已從光元件 EV/EBITDA 週期邏輯→forward P/E backlog 溢價→再升級為『Nvidia 衛星股』倍數定價。現價 $862.84 已超越 14 家分析師共識 PT 中位 $637（gap −26.3%），僅 JPM $950 支持當前估值"
  narrative_error_type: "敘事慣性 + 離散事件永久化 + 身份定義錯誤（反向版）"
  mispricing_hotspot: |
    v2.0 主命題：現價已過度定價 CPO 上游 InP 戰略價值與 Nvidia 綁定深度。
    v1.1.0 看到的是『市場低估』的 edge（long 方向），v2.0 看到的是『市場過熱』的反向 edge。
    三個硬數據逼迫 flip：(1) 14 位分析師共識 PT $637，gap vs 現價 −26%；(2) CPO 2027 = 30% 已 LightCounting 官方確認（v1.1.0 雙紅正確但程度被低估）；(3) Ciena 22% + Google 21% = Top-2 43%，超越 2023 Ciena 砍單 precedent 的集中度；(4) Nvidia 合作條款公開揭露為 **nonexclusive** preferred equity + Greensboro 廠要到 **mid-2028** 才量產——這是『戰略合作』而非『獨家鎖定』

