    (4) 共識 PT 中位上修至 ≥ $800；或
    (5) FY27 展望上修 ≥ 20%
  current_status: "🟢"
  notes: |
    v2.0 方向 FLIP 依據：
    (a) EV/P = -19.9%, R/R = 0.33x（稍改善但仍<0.5）
    (b) 我的 p_bull=25% vs 市場隱含 p_bull=62.5%（差 -37pp，反向 edge）
    (c) 共識 PT $637 vs 現價 $862（差 -26%，僅 JPM 支持）
    (d) CPO 雙紅保留，Ciena 集中度超越 2023 precedent
    (e) 敘事升級至『Nvidia-blessed monopoly』= 敘事慣性晚期
    (f) Nvidia 合作公開為 nonexclusive，Greensboro 要到 mid-2028 量產

