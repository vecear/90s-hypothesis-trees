      - id: H-1D-leaf-3
        hypothesis: "Coherent (COHR) 在同級產品線（EML / 高速 transceiver）毛利率與量能未超越 LITE"
        data_source: "COHR 10-Q + LITE 10-Q 逐項比對"
        data_url: "https://www.sec.gov/"
        check_frequency: "quarterly"
        conclusion: "TBD — 需下一輪同業季報對比"
        kill_condition: "COHR 同產品線毛利率連兩季高於 LITE >500bps"
        current_status: "🟡"
        last_checked: 2026-04-14
        last_value: "需補充"

      - id: H-1D-leaf-4
        hypothesis: "LITE 保持 200G-per-lane EML 市佔 ≥ 45%"
        data_source: "Yole Développement / LightCounting 市佔報告"
        data_url: "https://www.yolegroup.com/"
        check_frequency: "quarterly"
        conclusion: "目前 50-60%"
        kill_condition: "市佔 < 45% 且 QoQ 下滑"
