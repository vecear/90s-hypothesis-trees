# Lumentum Holdings (LITE) — 90s Hypothesis Tree
# 產業：光通訊元件 / AI 光互連 / OCS / InP 雷射
# 財年制：LITE 為 6 月結帳；Q2 FY2026 = 2025-10 ~ 2025-12 季

ticker: LITE
company_name: "Lumentum Holdings Inc."
version: 1.1.0
created: 2026-04-14
updated: 2026-04-14
changelog:
  - v1.0.0 (2026-04-14): 初始樹建立，四主幹，17 leaves
  - v1.1.0 (2026-04-14): 補足 🟡 資料、CPO 雙紅燈觸發、加入 Nvidia $2B 與 InP-to-CPO 新葉子

# ============================================
# Step 1 — 敘事偵測
# ============================================
narrative:
  market_story: "AI 光互連核心供應商，1.6T supercycle 與 OCS backlog 延伸至 2028；Nvidia 2026/3 直投 $2B 強化戰略地位"
  implied_assumptions:
    - "1.6T ramp 持續 2-3 年至少至 2027"
    - "InP 雷射產能瓶頸支撐高毛利，不會被 CPO 快速顛覆"
    - "大型 hyperscaler（Google/Meta/Microsoft）資本支出不會在 2026 見頂"
    - "OCS 是可延續的第二成長引擎，非一次性專案"
    - "（新）LITE 在 CPO 世代仍是核心 InP 雷射供應商，非被替代品"
  pricing_logic: "從 EV/EBITDA 光元件週期邏輯 → 轉向 AI 受益股 forward P/E + backlog 能見度溢價 + Nvidia partnership premium"
  narrative_error_type: "生命週期錯位 + 身份定義錯誤"
  mispricing_hotspot: "v1.1.0 修正：市場可能在 CPO 二元對立假設下（pluggable 死或活）誤解 LITE 的真實卡位（InP laser 在兩個世代都是上游瓶頸）。真正被低估的是 LITE 作為 'CPO-agnostic InP 供應商' 的長期地位，而非單純 pluggable transceiver 廠商。"

# ============================================
# Step 2 — 核心假設 H-0
# ============================================
h0:
  statement: "LITE 的 Cloud & Networking segment 未來 8 季（至 2027 Q4）的年化毛利金額將超過當前賣方共識 ≥15%，因市場仍部分用光元件週期邏輯給 2027+ 年度折價，並低估 InP 產能稀缺在 CPO 過渡期內的 pricing power。"
  direction: "long"
  falsifiability: "Cloud 毛利金額 YoY 成長率連續兩季低於 15%；或 backlog from 2028 被下修 >30%"
  kill_condition: "(1) 連續兩季 Cloud & Networking segment 營收 YoY < 40%；或 (2) 任一 Top-3 hyperscaler 公開宣布 AI cluster 主力改採非 LITE 供應（含 CPO、Silicon Photonics）；或 (3) 公司下修 FY27 展望 >20%"
  current_status: "🟢"
  notes: "v1.1.0: CPO leaf 雙紅觸發但 H-0 未死——因 LITE 是 CPO 的上游 InP laser 供應商，顛覆性是部分被消化而非全殺；詳見新葉 H-1D-leaf-5"

# ============================================
# Step 3 — 樹結構
# ============================================
tree_structure: "對立面（AI 受益分部 vs 拖累分部）＋分項組合"

branches:

  # ------------------------------------------
  - id: H-1A
    name: "Cloud & Networking — AI 光互連引擎"
    framework: "波特五力"
    framework_rationale: "評估光模組市場供需緊俏度（InP 供給稀缺）與 hyperscaler 買方議價力的平衡"
    core_question: "1.6T / OCS 訂單的可持續性能撐過 8 個季度嗎？"
    leaves:
      - id: H-1A-leaf-1
        hypothesis: "Top-3 hyperscaler 對 LITE 的年度採購 YoY 成長 ≥ 40%"
        data_source: "公司 10-K 客戶集中度揭露 + hyperscaler capex guidance"
        data_url: "https://investor.lumentum.com/"
        check_frequency: "quarterly"
        conclusion: "Q3 FY26 guidance $805M 中位代表 +85% YoY，遠超 40%"
        kill_condition: "連續兩季 YoY < 40%"
        current_status: "🟢"
        last_checked: 2026-04-14
        last_value: "Q3 FY26 guidance +85% YoY"

      - id: H-1A-leaf-2
        hypothesis: "InP 雷射產能 allocation runway ≥ 18 個月"
        data_source: "法說會 commentary + 日本廠產能公告"
        data_url: "https://investor.lumentum.com/"
        check_frequency: "quarterly"
        conclusion: "InP 產能被訂走 32 個月，遠超 18 個月"
        kill_condition: "allocation runway < 12 個月"
        current_status: "🟢"
        last_checked: 2026-04-14
        last_value: "32 months allocated (2026-04)"

      - id: H-1A-leaf-3
        hypothesis: "OCS backlog 延伸至 2027+"
        data_source: "公司公告 OCS backlog 數字"
        data_url: "https://investor.lumentum.com/"
        check_frequency: "quarterly"
        conclusion: "OCS backlog 已 >$400M，延伸至 2028"
        kill_condition: "backlog 下修 >30% 或 OCS 季營收 QoQ 連兩季下滑"
        current_status: "🟢"
        last_checked: 2026-04-14
        last_value: "OCS backlog >$400M，訂單覆蓋至 2028"

      - id: H-1A-leaf-4
        hypothesis: "1.6T 模組量產認證進度不落後 Coherent 與 Fabrinet"
        data_source: "法說會 + 同業產品公告 + OFC 2026 demo"
        data_url: "https://www.businesswire.com/news/home/20260317080634/"
        check_frequency: "quarterly"
        conclusion: "Google/Amazon 已在 2025 認證 LITE 1.6T DR8；2026 量產；OFC 2026 展示 scale-out/up/across 全系列。但 Fabrinet 為 Nvidia 1.6T transceiver 獨家組裝夥伴，LITE 在 Nvidia 通路是零組件供應而非模組供應——架構差異需留意"
        kill_condition: "COHR 或 Fabrinet 取得超過 LITE 的 1.6T 重要認證時程優勢"
        current_status: "🟢"
        last_checked: 2026-04-14
        last_value: "2025 Google/Amazon 認證；2026 量產 ramp；200G EML 產能 +40% 2025、+40% 2026"

      - id: H-1A-leaf-5
        hypothesis: "單一最大客戶營收集中度 < 30%"
        data_source: "10-K Concentration of Credit Risk 段落 + Bloomberg 估計"
        data_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=0001633978"
        check_frequency: "quarterly"
        conclusion: "FY25: Google 15.4%、Ciena 16%；Bloomberg 近季估計 Ciena 22%、Google 21%。單一客戶仍 < 30%，但 Top-2 合計 ~43%——集中度上升中"
        kill_condition: "單一客戶集中度 > 40%"
        current_status: "🟡"
        last_checked: 2026-04-14
        last_value: "Top-1: Ciena ~22% (2026 est.); Top-2: Google ~21%"

  # ------------------------------------------
  - id: H-1B
    name: "Industrial & Consumer — Legacy 分部"
    framework: "行業生命週期"
    framework_rationale: "判斷 Consumer（Apple 3D sensing）是否穩定底部；公司已策略性去優先化"
    core_question: "非 AI 分部是止血還是繼續拖累？"
