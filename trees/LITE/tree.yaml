    assumptions:
      - "OCS + 1.6T 雙引擎延伸至 2028，backlog 再上修"
      - "Nvidia $2B 合作帶來 CPO 供應鏈獨家卡位，LITE 從 pluggable 供應商升級為 CPO InP 上游"
