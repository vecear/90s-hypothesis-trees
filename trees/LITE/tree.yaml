scenarios:
  bull:
    price: 900
    assumptions:
      - "OCS + 1.6T 雙引擎延伸至 2028，backlog 再上修"
      - "InP 產能持續緊俏，毛利率突破 50% non-GAAP"
      - "CPO 2027 部署量 < 8%，對 LITE 無實質衝擊"
      - "Consumer 分部 2026 下半年止跌"
    my_probability: 0.30
    market_implied_probability: 0.20
    source: "賣方高端目標價 range top"

  base:
    price: 650
    assumptions:
      - "1.6T ramp 按 guidance 兌現至 FY27"
      - "毛利率維持 40-45% 區間"
      - "OCS 穩定貢獻但不再大幅上修"
      - "CPO 2027 部署量 10-15%，輕度分食"
    my_probability: 0.50
    market_implied_probability: 0.55
    source: "共識目標中位"

  bear:
    price: 455
    assumptions:
      - "Hyperscaler capex 在 2026H2 放緩"
      - "Nvidia / Broadcom 加速 CPO，份額從 2027 開始被吃"
      - "InP 產能擴出後價格開始下滑"
      - "Consumer 分部持續拖累"
    my_probability: 0.20
    market_implied_probability: 0.25
    source: "賣方低端目標價"

